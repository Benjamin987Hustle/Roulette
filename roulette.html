<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>42 Roulettes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at center, #1a0000 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #ffffff;
      overflow: hidden;
    }

    /* Casino Night sign — white card with neon red glow */
    .casino-sign {
      background: #ffffff;
      border-radius: 18px;
      border: 3px solid #ff0000;
      padding: 10px 28px 8px;
      box-shadow:
        0 0 18px rgba(255,0,0,0.8),
        0 0 50px rgba(255,0,0,0.35),
        inset 0 0 12px rgba(255,0,0,0.08);
      margin-bottom: 0.2rem;
    }

    .casino-sign img {
      width: 220px;
      max-width: 70vw;
      display: block;
    }

    /* 42 Events logo — centré sur le moyeu */
    .brand-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      pointer-events: none;
      z-index: 5;
    }

    .brand-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Bouton plein écran */
    .fullscreen-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.6);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .fullscreen-btn:hover {
      border-color: #ff0000;
      background: rgba(255,0,0,0.15);
    }

    .fullscreen-btn svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 500px;
      height: 500px;
    }

    canvas#wheel {
      position: absolute;
      top: 0; left: 0;
      border-radius: 50%;
      box-shadow:
        0 0 0 6px #ffffff,
        0 0 0 12px #ff0000,
        0 0 0 18px #ffffff,
        0 0 50px rgba(255,0,0,0.35);
    }

    .ball-track {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .marker {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 22px solid #ff0000;
      filter: drop-shadow(0 2px 6px rgba(255,0,0,0.8));
      z-index: 10;
    }

    .result-panel {
      text-align: center;
      min-height: 100px;
    }

    .result-number {
      font-size: 5rem;
      font-weight: bold;
      line-height: 1;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .result-number.show {
      opacity: 1;
      transform: scale(1);
    }

    .result-number.red   { color: #ff0000; text-shadow: 0 0 25px rgba(255,0,0,0.7); }
    .result-number.black { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    .result-number.green { color: #4caf50; text-shadow: 0 0 20px rgba(76,175,80,0.6); }

    .result-label {
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #ff0000;
      margin-top: 0.3rem;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .result-label.show { opacity: 1; }

    .spin-btn {
      padding: 1rem 3.5rem;
      font-size: 1.2rem;
      font-family: 'Georgia', serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff0000, #aa0000, #ff0000);
      color: #ffffff;
      border: 2px solid #ffffff;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(255,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
    }

    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 35px rgba(255,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .spin-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .history {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 500px;
    }

    .history-item {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.3);
      animation: pop-in 0.3s ease;
      color: #ffffff;
    }

    .history-item.red   { background: #cc0000; }
    .history-item.black { background: #1a1a1a; }
    .history-item.green { background: #1a7a2e; }

    @keyframes pop-in {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .history-label {
      font-size: 0.75rem;
      color: #ff0000;
      letter-spacing: 0.15em;
      opacity: 0.85;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    /* ── Responsive mobile ───────────────────────────────── */
    @media (max-width: 560px) {
      body {
        justify-content: flex-start;
        padding: 1.2rem 0 2rem;
        overflow-y: auto;
      }

      .game-container {
        gap: 0.8rem;
        width: 100%;
        padding: 0 10px;
      }

      .casino-sign {
        padding: 6px 12px 4px;
      }

      .casino-sign img {
        width: min(180px, 58vw);
      }

      /* Roue dézoomer — 75vw max */
      .wheel-wrapper {
        width: min(75vw, 340px);
        height: min(75vw, 340px);
      }

      canvas#wheel,
      #ballCanvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* Logo moyeu scale avec la roue */
      .brand-badge {
        width: min(10.8vw, 49px);
        height: min(10.8vw, 49px);
      }

      .result-panel {
        min-height: 60px;
      }

      .result-number {
        font-size: 3rem;
      }

      .spin-btn {
        padding: 0.8rem 2.2rem;
        font-size: 0.95rem;
      }

      .history {
        max-width: 90vw;
      }

      .history-item {
        width: 28px;
        height: 28px;
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>

<!-- Bouton plein écran -->
<button class="fullscreen-btn" id="fullscreenBtn" title="Plein écran">
  <svg id="fsIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
  </svg>
</button>

<div class="game-container">

  <div class="casino-sign">
    <img src="23.png" alt="Casino Night Montréal" />
  </div>

  <div class="wheel-wrapper">
    <div class="marker"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
    <canvas id="ballCanvas" class="ball-track" width="500" height="500"></canvas>
    <div class="brand-badge">
      <img src="2.png" alt="42 Events" />
    </div>
  </div>

  <div class="result-panel">
    <div class="result-number" id="resultNumber">—</div>
    <div class="result-label" id="resultLabel"></div>
  </div>

  <button class="spin-btn" id="spinBtn">Lancer</button>

  <div>
    <div class="history-label" id="historyLabel"></div>
    <div class="history" id="history"></div>
  </div>
</div>


<script>
// ─── European Roulette Data ───────────────────────────────────────────────────
const POCKETS = [
  0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,
  24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26
];
const N = POCKETS.length; // 37

const RED_NUMS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);

function getColor(n) {
  if (n === 0) return 'green';
  return RED_NUMS.has(n) ? 'red' : 'black';
}

// Sector angle
const SECTOR = (2 * Math.PI) / N;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const wheelCanvas  = document.getElementById('wheel');
const ballCanvas   = document.getElementById('ballCanvas');
const wCtx         = wheelCanvas.getContext('2d');
const bCtx         = ballCanvas.getContext('2d');
const CX = wheelCanvas.width  / 2;
const CY = wheelCanvas.height / 2;
const R  = CX - 4; // outer radius

// ─── Draw wheel at angle offset ───────────────────────────────────────────────
function drawWheel(rotation) {
  wCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);

  // Background disk
  wCtx.beginPath();
  wCtx.arc(CX, CY, R, 0, 2 * Math.PI);
  wCtx.fillStyle = '#1a0e00';
  wCtx.fill();

  for (let i = 0; i < N; i++) {
    const startAngle = rotation + i * SECTOR - SECTOR / 2;
    const endAngle   = startAngle + SECTOR;
    const num = POCKETS[i];
    const col = getColor(num);

    // Sector fill
    wCtx.beginPath();
    wCtx.moveTo(CX, CY);
    wCtx.arc(CX, CY, R - 2, startAngle, endAngle);
    wCtx.closePath();

    if (col === 'green')      wCtx.fillStyle = '#1a7a2e';
    else if (col === 'red')   wCtx.fillStyle = '#c0392b';
    else                      wCtx.fillStyle = '#1e1e1e';
    wCtx.fill();

    // Separator line
    wCtx.beginPath();
    wCtx.moveTo(CX, CY);
    wCtx.arc(CX, CY, R - 2, startAngle, startAngle + 0.01);
    wCtx.closePath();
    wCtx.strokeStyle = '#ffffff';
    wCtx.lineWidth = 1.2;
    wCtx.stroke();

    // Number text
    wCtx.save();
    wCtx.translate(CX, CY);
    wCtx.rotate(startAngle + SECTOR / 2);
    wCtx.textAlign = 'right';
    wCtx.textBaseline = 'middle';
    wCtx.fillStyle = '#ffffff';
    wCtx.font = 'bold 11px Arial';
    wCtx.fillText(num, R - 10, 0);
    wCtx.restore();
  }

  // Inner ring (red)
  wCtx.beginPath();
  wCtx.arc(CX, CY, R * 0.72, 0, 2 * Math.PI);
  wCtx.strokeStyle = '#ff0000';
  wCtx.lineWidth = 3;
  wCtx.stroke();

  // Inner dark disk
  wCtx.beginPath();
  wCtx.arc(CX, CY, R * 0.7, 0, 2 * Math.PI);
  wCtx.fillStyle = '#0a0a0a';
  wCtx.fill();

  // Decorative inner ring (white)
  wCtx.beginPath();
  wCtx.arc(CX, CY, R * 0.68, 0, 2 * Math.PI);
  wCtx.strokeStyle = '#ffffff';
  wCtx.lineWidth = 2;
  wCtx.stroke();

  // Center hub
  wCtx.beginPath();
  wCtx.arc(CX, CY, 22, 0, 2 * Math.PI);
  const hubGrad = wCtx.createRadialGradient(CX - 5, CY - 5, 2, CX, CY, 22);
  hubGrad.addColorStop(0, '#ffffff');
  hubGrad.addColorStop(1, '#ff0000');
  wCtx.fillStyle = hubGrad;
  wCtx.fill();
  wCtx.strokeStyle = '#000000';
  wCtx.lineWidth = 2;
  wCtx.stroke();
}

// ─── Draw ball ────────────────────────────────────────────────────────────────
function drawBallAt(x, y) {
  // Outer glow
  const glow = bCtx.createRadialGradient(x, y, 1, x, y, 12);
  glow.addColorStop(0, 'rgba(255,255,255,0.45)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  bCtx.beginPath();
  bCtx.arc(x, y, 12, 0, 2 * Math.PI);
  bCtx.fillStyle = glow;
  bCtx.fill();

  // Ball body
  const ballGrad = bCtx.createRadialGradient(x - 2, y - 2, 0.5, x, y, 7);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.55, '#d8d8d8');
  ballGrad.addColorStop(1, '#7a7a7a');
  bCtx.beginPath();
  bCtx.arc(x, y, 7, 0, 2 * Math.PI);
  bCtx.fillStyle = ballGrad;
  bCtx.fill();

  // Specular highlight
  const spec = bCtx.createRadialGradient(x - 2.5, y - 2.8, 0, x - 2.5, y - 2.8, 3);
  spec.addColorStop(0, 'rgba(255,255,255,0.9)');
  spec.addColorStop(1, 'rgba(255,255,255,0)');
  bCtx.beginPath();
  bCtx.arc(x - 2, y - 2.5, 3, 0, 2 * Math.PI);
  bCtx.fillStyle = spec;
  bCtx.fill();
}

function drawBall(angle, trackR, speedFraction) {
  bCtx.clearRect(0, 0, ballCanvas.width, ballCanvas.height);

  // Motion trail — only when ball is moving fast
  if (speedFraction > 0.12) {
    const trailLen = speedFraction * 1.1; // radians
    const steps = 12;
    for (let i = steps - 1; i >= 0; i--) {
      const frac = i / steps;
      const ta = angle - trailLen * frac;
      const tx = CX + Math.cos(ta) * trackR;
      const ty = CY + Math.sin(ta) * trackR;
      bCtx.beginPath();
      bCtx.arc(tx, ty, 3 + 4 * frac, 0, 2 * Math.PI);
      bCtx.fillStyle = `rgba(215,215,225,${frac * speedFraction * 0.22})`;
      bCtx.fill();
    }
  }

  const x = CX + Math.cos(angle) * trackR;
  const y = CY + Math.sin(angle) * trackR;
  drawBallAt(x, y);
}

// ─── Animation state ──────────────────────────────────────────────────────────
let spinning   = false;
let wheelAngle = 0;
let ballAngle  = 0;
let ballTrackR = 0;
let animFrame  = null;

// Draw initial state
drawWheel(0);
bCtx.clearRect(0, 0, ballCanvas.width, ballCanvas.height);

// ─── Spin logic ───────────────────────────────────────────────────────────────
document.getElementById('spinBtn').addEventListener('click', () => {
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;

  document.getElementById('resultNumber').classList.remove('show');
  document.getElementById('resultLabel').classList.remove('show');

  const winIndex = Math.floor(Math.random() * N);
  const winNum   = POCKETS[winIndex];

  const totalWheelSpins = Math.floor(5 + Math.random() * 4);
  const targetWheelAngle = -(Math.PI / 2) - winIndex * SECTOR - totalWheelSpins * 2 * Math.PI;
  const spinDuration = 6000 + Math.random() * 2000;
  const startTime    = performance.now();
  const startWheelAngle = wheelAngle;

  const outerR = R - 14;
  const innerR = R * 0.75 + 10;

  // Calculate ball start and total delta so it lands exactly at the winning pocket
  // Pocket ends up at angle -π/2 (top) when wheel reaches targetWheelAngle
  const startBallAngle = Math.random() * 2 * Math.PI;
  ballAngle  = startBallAngle;
  ballTrackR = outerR;

  const pocketEndAngle = -Math.PI / 2;
  let remainder = ((pocketEndAngle - startBallAngle) % (2 * Math.PI));
  if (remainder > 0) remainder -= 2 * Math.PI;
  if (remainder === 0) remainder = -2 * Math.PI;
  const numRevs = Math.ceil(totalWheelSpins * 2.5 + 2);
  const totalBallDelta = remainder - numRevs * 2 * Math.PI; // large negative = many CCW revolutions

  const ballDuration = spinDuration * 0.86;

  // Clatter state — simulates ball bouncing between pockets as it slows
  let clatterPhase = Math.random() * Math.PI * 2;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function easeOutQuad(t) {
    return 1 - Math.pow(1 - t, 2);
  }

  function smoothStep(t) {
    t = Math.max(0, Math.min(1, t));
    return t * t * (3 - 2 * t);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / spinDuration, 1);

    // Wheel rotation (cubic ease-out)
    wheelAngle = startWheelAngle + (targetWheelAngle - startWheelAngle) * easeOut(t);

    // Ball angular position (quadratic ease-out = constant deceleration, most physical)
    const ballT    = Math.min(elapsed / ballDuration, 1);
    const ballEased = easeOutQuad(ballT);
    const speedFraction = 1 - ballEased; // 1 = full speed, 0 = stopped

    // Clatter: random oscillations that appear as the ball slows (below 28% speed)
    clatterPhase += Math.max(0.04, speedFraction * 0.45);
    const clatterIntensity = smoothStep(Math.max(0, (0.28 - speedFraction) / 0.28));
    const clatterFade = Math.max(0, 1 - ballT * 1.4); // fades to zero before ball fully stops
    const clatter = Math.sin(clatterPhase * 6.8) * SECTOR * 0.38 * clatterIntensity * clatterFade;

    ballAngle = startBallAngle + totalBallDelta * ballEased + clatter;

    // Radius: physically tied to speed — high speed keeps ball on outer rim,
    // slow speed lets it spiral inward (centrifugal force analogy)
    const radT = smoothStep(Math.max(0, Math.min(1, (0.52 - speedFraction) / 0.52)));
    const radiusClatter = Math.sin(clatterPhase * 4.1) * 7 * clatterIntensity * clatterFade;
    ballTrackR = outerR + (innerR - outerR) * radT + radiusClatter;

    drawWheel(wheelAngle);
    drawBall(ballAngle, ballTrackR, speedFraction);

    if (t < 1) {
      animFrame = requestAnimationFrame(animate);
    } else {
      // Final frame: wheel and ball at exact positions
      wheelAngle = targetWheelAngle;
      drawWheel(wheelAngle);
      const pocketAngle = wheelAngle + winIndex * SECTOR;
      ballTrackR = innerR;
      drawBall(pocketAngle, ballTrackR, 0);

      spinning = false;
      btn.disabled = false;
      showResult(winNum);
      addHistory(winNum);
    }
  }

  animFrame = requestAnimationFrame(animate);
});

// ─── Result display ───────────────────────────────────────────────────────────
function showResult(num) {
  const col = getColor(num);
  const el  = document.getElementById('resultNumber');
  const lbl = document.getElementById('resultLabel');

  el.textContent = num;
  el.className   = 'result-number ' + col;
  lbl.textContent = col === 'green' ? '🟢 Zéro' : col === 'red' ? '🔴 Rouge' : '⚫ Noir';

  setTimeout(() => {
    el.classList.add('show');
    lbl.classList.add('show');
  }, 100);
}

// ─── History ──────────────────────────────────────────────────────────────────
function addHistory(num) {
  const col = getColor(num);
  const container = document.getElementById('history');
  const label     = document.getElementById('historyLabel');

  label.textContent = 'Derniers résultats';

  const dot = document.createElement('div');
  dot.className = 'history-item ' + col;
  dot.textContent = num;
  container.prepend(dot);

  // Keep only last 15
  while (container.children.length > 15) {
    container.removeChild(container.lastChild);
  }
}

// ─── Plein écran ──────────────────────────────────────────────────────────────
const fsBtn  = document.getElementById('fullscreenBtn');
const fsIcon = document.getElementById('fsIcon');

const iconExpand   = '<path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>';
const iconCollapse = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';

fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});

document.addEventListener('fullscreenchange', () => {
  fsIcon.innerHTML = document.fullscreenElement ? iconCollapse : iconExpand;
});
</script>
</body>
</html>
